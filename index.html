<!DOCTYPE html>
<html>
<head>
    <title>HPC Matrix Multiplication</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            margin: 20px auto;
            width: 80%;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        input {
            width: 50px;
            padding: 6px;
            border-radius: 6px;
            border: none;
            text-align: center;
        }

        table {
            margin: 10px auto;
        }

        button {
            padding: 10px 20px;
            margin: 8px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .matrix-box {
            display: inline-block;
            margin: 10px;
        }

        #result {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
            margin-top: 15px;
            display: inline-block;
            min-width: 300px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        canvas {
            margin-top: 20px;
            background: white;
            border-radius: 10px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h1>🚀 HPC Matrix Multiplication</h1>

<div class="container">

<label>Matrix Size:</label>
<input type="number" id="size" value="2" min="2">
<button onclick="generateMatrices()">Generate</button>

<div>
    <div class="matrix-box">
        <h3>Matrix A</h3>
        <div id="matrixA"></div>
    </div>

    <div class="matrix-box">
        <h3>Matrix B</h3>
        <div id="matrixB"></div>
    </div>
</div>

<br>

<button onclick="multiply()">Run Parallel (Backend)</button>

<h3>Result</h3>
<div id="result">Result will appear here...</div>

<canvas id="chart" width="400" height="200"></canvas>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

function generateMatrices() {
    let n = document.getElementById("size").value;
    createMatrix("matrixA", n);
    createMatrix("matrixB", n);
}

function createMatrix(id, n) {
    let html = "<table>";
    for (let i = 0; i < n; i++) {
        html += "<tr>";
        for (let j = 0; j < n; j++) {
            html += `<td><input id="${id}-${i}-${j}" value="${Math.floor(Math.random()*5)+1}"></td>`;
        }
        html += "</tr>";
    }
    html += "</table>";
    document.getElementById(id).innerHTML = html;
}

function getMatrix(id, n) {
    let matrix = [];
    for (let i = 0; i < n; i++) {
        let row = [];
        for (let j = 0; j < n; j++) {
            row.push(parseInt(document.getElementById(`${id}-${i}-${j}`).value));
        }
        matrix.push(row);
    }
    return matrix;
}

let chart;

async function multiply() {
    let n = parseInt(document.getElementById("size").value);
    let A = getMatrix("matrixA", n);
    let B = getMatrix("matrixB", n);

    try {
        let response = await fetch("http://localhost:8081/multiply", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ A: A, B: B })
        });

        let data = await response.json();

        let C = data.result;
        let serial = data.serialTime;
        let parallel = data.parallelTime;

        let output = "";

        for (let row of C) output += row.join(" ") + "\n";

        output += "\nSerial Time: " + serial.toFixed(2) + " ms";
        output += "\nParallel Time: " + parallel.toFixed(2) + " ms";
        output += "\nSpeedup: " + (serial / parallel).toFixed(2) + "x";

        document.getElementById("result").innerText = output;

        drawChart(serial, parallel);

    } catch (err) {
        document.getElementById("result").innerText = "❌ Error connecting to backend!";
        console.error(err);
    }
}

function drawChart(serial, parallel) {
    let ctx = document.getElementById("chart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Serial', 'Parallel'],
            datasets: [{
                label: 'Execution Time (ms)',
                data: [serial, parallel]
            }]
        }
    });
}

</script>

</body>
</html>
